name: CI

# Triggers — when does this workflow run?
on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main]

jobs:

  # ── Job 1: Lint and type check ───────────────────────────────────────────────
  lint:
    name: Lint and type check
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip             # Cache pip downloads between runs

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff — lint
        run: ruff check .

      - name: Mypy — type check
        run: mypy . --ignore-missing-imports

  # ── Job 2: Unit tests ────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: lint                  # Only run if lint passes first

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Java (required by PySpark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: pytest tests/unit/ -v --tb=short --cov=. --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml     # Gives you a coverage badge on GitHub

  # ── Job 3: Docker build check ────────────────────────────────────────────────
  docker-build:
    name: Docker build check
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t lakehouse-pipeline:ci .