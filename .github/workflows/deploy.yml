name: Deploy

# Only deploy when code lands on main
on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-west-1

jobs:

  # ── Job 1: Deploy to staging ──────────────────────────────────────────────
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    environment: staging         # Maps to GitHub Environment with its own secrets

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Set up Databricks CLI
        uses: databricks/setup-cli@main

      - name: Deploy to staging via Databricks Asset Bundles
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST_STAGING }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_STAGING }}
        run: databricks bundle deploy --target staging

  # ── Job 2: Integration tests against staging ──────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: deploy-staging        # Only run after staging deploy succeeds

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run integration tests
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST_STAGING }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_STAGING }}
          S3_BUCKET:        ${{ secrets.S3_BUCKET_STAGING }}
        run: pytest tests/integration/ -v --tb=short

  # ── Job 3: Deploy to prod ─────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to prod
    runs-on: ubuntu-latest
    needs: integration-tests     # Only run after integration tests pass
    environment: prod            # Requires manual approval in GitHub UI

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy to prod via Databricks Asset Bundles
        env:
          DATABRICKS_HOST:  ${{ secrets.DATABRICKS_HOST_PROD }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN_PROD }}
        run: databricks bundle deploy --target prod